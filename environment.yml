name: tensorflow_omar_basha

channels:
  - conda-forge
  - defaults

dependencies:
  - python=3.10
  - pip

  - pip:
    - tensorflow-cpu==2.15.0      # CPU-only TF (lighter & faster install than full TF)
    - scikit-learn==1.4.2
    - numpy==1.26.4
    - pandas==2.2.2
    - matplotlib==3.9.0
    - seaborn==0.13.2
    - opencv-python==4.9.0.80
    - Pillow==10.3.0
    - ipykernel==6.29.4
    - notebook==7.2.0
    - jupyterlab==4.2.0
    - tqdm==4.66.4
